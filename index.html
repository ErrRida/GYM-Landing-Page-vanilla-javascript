<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <title>Web Design Mastery | Yoga</title>
</head>

<body>
    <nav>
        <div class="nav__header">
            <div class="nav__logo">
                <a href="#">
                    <img src="assets/logo.png" alt="logo" class="logo" />
                </a>
            </div>
            <div class="nav__menu__btn" id="menu-btn">
                <i class="ri-menu-4-line"></i>
            </div>
        </div>
        <ul class="nav__links" id="nav-links">
            <li><a href="#">HOME</a></li>
            <li><a href="#">SERVICE</a></li>
            <li><a href="#">PORTFOLIO</a></li>
            <li><a href="#">CONTACT US</a></li>
        </ul>
    </nav>

    <header>
        <div class="header__image">
            <img src="assets/athletic-man-training-biceps-at-the-gym-photo.jpg" alt="header" />
        </div>
        <div class="header__content">
            <h2>JOIN OUR CLUB</h2>
            <h1>GYM For Your Healthy Life</h1>
            <p>
                Join our club and discover the true benefits of GYM. Enhance
                strength, reduce stress, and embrace a healthier, balanced
                lifestyle with guided exercises made for everyone.
            </p>
            <div class="header__btn">
                <button>BOOK NOW</button>
            </div>
            <ul class="header__socials">
                <li>
                    <a href="#"><i class="ri-facebook-fill"></i></a>
                </li>
                <li>
                    <a href="#"><i class="ri-twitter-fill"></i></a>
                </li>
                <li>
                    <a href="#"><i class="ri-instagram-line"></i></a>
                </li>
            </ul>
        </div>
    </header>

    <script src="https://unpkg.com/scrollreveal"></script>
    <script src="main.js"></script>
